# This file controls the settings for your Quarto template from www.marvinschmitt.com

# website settings
website:
  title: "Jiayi Sun"                                # Your name
  description: "Hi, welcome to my website!"   # A brief slogan (optional)
  image: img/myimg.jpg
  
  favicon: img/logo-cwru.png
  
  # start of the navigation bar at the top of the website
  navbar:
    pinned: true
    logo: /img/logo-cwru.png
    
    # your sub-pages
    left:
      - text: "Research and Teach"
        href: Research and Teach/index.qmd
      - text: "CV"
        href: cv/index.html
      - text: "Blog"
        href: Blog/index2.html
    
    # your social media handles
    right:
      - icon: folder-symlink
        href: https://case.edu/socialwork/node/10681
      - icon: envelope
        aria-label: email
        href: "mailto:jxs1730@case.edu"
  
  

# Don't touch unless you know what you are doing :) ------------
  search: 
    location: navbar
    type: textbox
 
project:
  type: website
  output-dir: docs

  preview: 
    port: 22222
    browser: true
    watch-inputs: true
    navigate: true

execute:
  freeze: true

format:
  html:
    fontsize: 1.1em
    theme: 
      - pulse
      - html/styles.scss
    toc: false
    code-link: true
    anchor-sections: true
    fig-cap-location: margin
    reference-location: margin
    footnotes-hover: true